# Intro on main page, content is markdown
homeIntroTitle = ''
homeIntroContent = """

I am a PhD candidate at the [**Toulouse School of Economics**](https://www.tse-fr.eu/). 

**Research fields:** Labor Economics, Industrial Organization, Development Economics.

I combine design-based methods with structural models to explore the interplay between education policy, human capital accumulation and labor market outcomes.

In the fall of 2026, I will join <a href="https://gobierno.uc.cl/escuela" class="highlighted-alt" style="font-weight: bold;"> Pontificia Universidad Católica de Chile</a> as an Assistant Professor in the School of Government.

Don't hesitate to reach out at <span id="e1"></span> / <span id="e2"></span>

[**CV (PDF)**](/files/pal-cv.pdf)


"""

